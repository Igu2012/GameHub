
<!DOCTYPE html>
<html lang="en-us">
<head>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Red Ball 4</title>
    
    <style>
        * { margin: 0; padding: 0; border: 0; overflow: hidden; }
        body { background: #000; position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #game-container { position: absolute; width: 100%; height: 100%; }
        #game { width: 100%; height: 100%; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #002B50; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loading-content { text-align: center; }
        .loading-text { color: white; font-size: 32px; font-family: sans-serif; margin-bottom: 20px; }
        .progress-container { width: 300px; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #3CF7DC; transition: width 0.3s ease; }
    </style>
    <script>
        function enableFullscreen() {
            var doc = window.document;
            var docEl = doc.documentElement;
            var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (requestFullScreen) {
                    requestFullScreen.call(docEl);
                }
            }
        }
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            ['touchstart', 'click', 'keydown'].forEach(event => {
                window.addEventListener(event, enableFullscreen, { once: true });
            });
        }
    </script>

    <script>
        window.PokiSDK = {
            init: function() { return Promise.resolve(); },
            gameLoadingStart: function() {},
            gameLoadingFinished: function() {},
            gameLoadingProgress: function() {},
            gameplayStart: function() {},
            gameplayStop: function() {},
            happyTime: function() {},
            setDebug: function() {},
            commercialBreak: function() { return Promise.resolve(); },
            rewardedBreak: function() { return Promise.resolve(true); },
            displayAd: function() { return Promise.resolve(); },
            destroyAd: function() {},
            initPokiBridge: function() { return Promise.resolve(); }
        };
        window.initPokiBridge = function() { return Promise.resolve(); };
    </script>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-text">LOADING... 0%</div>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>
    <script src="Build/10803.loader.js"></script>
    <script>
        var config = {
            dataUrl: "9fce8ead7dd6a9263cda3ed3ec873dd3.data",
            frameworkUrl: "e8fdbdd07c2824facdf87342f6be608a.js",
            codeUrl: "b48067ed8fa8d994a559745a5a8a38d4.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "GameHub",
            productName: "Red Ball 4",
            productVersion: "1.08.03",
        };

        var canvas = document.querySelector("#game");
        var loadingScreen = document.querySelector("#loading-screen");
        var progressBar = document.querySelector(".progress-bar");
        var loadingText = document.querySelector(".loading-text");

        createUnityInstance(canvas, config, (progress) => {
            progressBar.style.width = 100 * progress + "%";
            loadingText.textContent = "LOADING... " + Math.round(100 * progress) + "%";
        }).then((unityInstance) => {
            loadingScreen.style.display = "none";
        }).catch((message) => {
            alert(message);
        });
    </script>
</body>
</html>
