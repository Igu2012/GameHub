<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jogue instantaneamente, sem downloads, e aproveite jogos compatíveis com todos os dispositivos.">
    <meta name="keywords" content="jogos online, jogos grátis, sem downloads, jogos HTML5, Subway Surfers, Minecraft, FNAF, Geometry Dash">
    <meta name="author" content="GameHub">
    <meta property="og:title" content="GameHub - Jogos Online Grátis">
    <meta property="og:description" content="Jogue instantaneamente, sem downloads, e aproveite jogos compatíveis com todos os dispositivos.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gamehubjogos.github.io/">
    <title>GameHub</title>
    
    <link rel="stylesheet" href="style.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GameHub",
      "description": "Portal de jogos online gratuitos sem necessidade de downloads",
      "url": "https://gamehubjogos.github.io/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://gamehubjogos.github.io/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo" id="logoLink" style="cursor: pointer;">GameHub</div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Pesquisar jogos...">
            </div>
            <div style="width: 40px;"></div>
        </div>
    </header>

    <div class="container">
        <nav class="categories-nav" id="categoriesNav">
            <button class="category-btn active" data-category="all">Todos</button>
        </nav>

        <div id="gamesContainer"></div>
    </div>

    <footer>
        <p id="footerYear"></p>
    </footer>

    <script src="script.js"></script>
    <script src="pwa.js"></script>
</body>
</html>
