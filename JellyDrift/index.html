<!DOCTYPE html>
<html lang="en-us">
  <head>
    <link rel="icon" type="image/png" href="../img/jellydrift.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Jelly Drift</title>
    <script src="Build/UnityLoader.js"></script>
    <style>
      * { margin: 0; padding: 0; border: 0; overflow: hidden; }
      body { background: #000; position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
      #unityContainer { position: absolute; width: 100%; height: 100%; }
      #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
      .loading-content { text-align: center; }
      .loading-text { color: white; font-size: 32px; font-family: sans-serif; margin-bottom: 20px; letter-spacing: 2px; }
      .progress-container { width: 300px; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
      .progress-bar { width: 0%; height: 100%; background: white; transition: width 0.3s ease; }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-text">LOADING... 0%</div>
        <div class="progress-container"><div class="progress-bar"></div></div>
      </div>
    </div>
    <div id="unityContainer"></div>

    <script>
      let max = 0;
      let done = 0;

      function updateProgress() {
        const progress = (done / max) * 100;
        const bar = document.querySelector(".progress-bar");
        const text = document.querySelector(".loading-text");
        if (bar) bar.style.width = progress + "%";
        if (text) text.textContent = `LOADING... ${Math.round(progress)}%`;
      }

      function mergeFiles(fileParts) {
        return new Promise((resolve, reject) => {
          let buffers = [];
          function fetchPart(index) {
            if (index >= fileParts.length) {
              let mergedBlob = new Blob(buffers);
              resolve(URL.createObjectURL(mergedBlob));
              return;
            }
            const partUrl = fileParts[index];
            fetch(partUrl)
              .then(r => {
                if (!r.ok) {
                  const contentType = r.headers.get("Content-Type");
                  if (contentType && contentType.includes("text/html")) {
                    throw new Error(`File not found or server returned HTML for: ${partUrl} (Status: ${r.status}, Content-Type: ${contentType})`);
                  } else {
                    throw new Error(`Failed to load file: ${partUrl} (Status: ${r.status}, Content-Type: ${contentType})`);
                  }
                }
                return r.arrayBuffer();
              })
              .then(data => {
                buffers.push(data);
                done++;
                updateProgress();
                fetchPart(index + 1);
              })
              .catch(reject);
          }
          fetchPart(0);
        });
      }

      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
        max += end;
        return parts;
      }

      Promise.all([
        mergeFiles(getParts("Build/jellydrift.data.unityweb", 1, 3)),
        mergeFiles(getParts("Build/jellydrift.wasm.code.unityweb", 1, 2)),
      ]).then(([dataUrl, wasmUrl]) => {
        UnityLoader.instantiate("unityContainer", {
          "companyName": "GameHub",
          "productName": "Jelly Drift",
          "productVersion": "0.4",
          "dataUrl": dataUrl,
          "wasmCodeUrl": wasmUrl,
          "wasmFrameworkUrl": "Build/jellydrift.wasm.framework.js",
          "graphicsAPI": ["WebGL 2.0"],
          "webglContextAttributes": {"preserveDrawingBuffer": false},
          "splashScreenStyle": "Dark",
          "backgroundColor": "#231F20",
          "unityVersion": "2019.4.19f1"
        }, {
          onProgress: (inst, prog) => { /* already handled by mergeFiles */ },
          Module: {
            onRuntimeInitialized: function () {
              setTimeout(() => {
                document.getElementById("loading-screen").style.display = "none";
              }, 500);
            },
          },
        });
      }).catch(err => {
        console.error(err);
        alert("Error loading game: " + err.message);
      });

      // Fullscreen Logic
      function toggleFullScreen() {
        var doc = window.document;
        var docEl = doc.documentElement;
        var request = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
          if (request) request.call(docEl).catch(e => {});
        }
      }
      setInterval(toggleFullScreen, 2000);
      ["click", "touchstart", "keydown"].forEach(ev => window.addEventListener(ev, toggleFullScreen, { passive: true }));
    </script>
  </body>
</html>
