<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Jelly Drift</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <script src="Build/UnityLoader.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        border: 0;
        overflow: hidden;
      }

      body {
        background: #000;
        position: fixed;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #unityContainer {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .loading-content {
        text-align: center;
      }

      .loading-text {
        color: white;
        font-size: 32px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin-bottom: 20px;
        letter-spacing: 2px;
      }

      .progress-container {
        width: 300px;
        height: 10px;
        background: #333;
        border-radius: 5px;
        overflow: hidden;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: white;
        transition: width 0.3s ease;
      }
    </style>
    <script>
      let max = 0;
      let done = 0;

      function updateProgress() {
        const progress = (done / max) * 100;
        const bar = document.querySelector(".progress-bar");
        const text = document.querySelector(".loading-text");
        if (bar) bar.style.width = progress + "%";
        if (text) text.textContent = `LOADING... ${Math.round(progress)}%`;
      }

      function mergeFiles(fileParts) {
        return new Promise((resolve, reject) => {
          let buffers = [];

          function fetchPart(index) {
            if (index >= fileParts.length) {
              let mergedBlob = new Blob(buffers);
              let mergedFileUrl = URL.createObjectURL(mergedBlob);
              resolve(mergedFileUrl);
              return;
            }
            fetch(fileParts[index])
              .then((response) => response.arrayBuffer())
              .then((data) => {
                buffers.push(data);
                done = done + 1;
                updateProgress();
                fetchPart(index + 1);
              })
              .catch(reject);
          }
          fetchPart(0);
        });
      }

      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) {
          parts.push(file + ".part" + i);
        }
        max = max + end;
        return parts;
      }

      function resizeUnityContainer() {
        var container = document.getElementById("unityContainer");
        container.style.width = window.innerWidth + "px";
        container.style.height = window.innerHeight + "px";
      }

      Promise.all([
        mergeFiles(getParts("Build/jellydrift.data.unityweb", 1, 3)),
        mergeFiles(getParts("Build/jellydrift.wasm.code.unityweb", 1, 2)),
      ]).then(([dataUrl, wasmurl]) => {
        window.dataUrll = dataUrl;
        window.wasmurll = wasmurl;
        var json = {
          "companyName": "GameHub",
          "productName": "Jelly Drift",
          "productVersion": "0.4",
          "dataUrl": dataUrl,
          "wasmCodeUrl": wasmurl,
          "wasmFrameworkUrl": "jellydrift.wasm.framework.js",
          "graphicsAPI": ["WebGL 2.0"],
          "webglContextAttributes": {"preserveDrawingBuffer": false},
          "splashScreenStyle": "Dark",
          "backgroundColor": "#231F20",
          "developmentBuild": false,
          "multithreading": false,
          "unityVersion": "2019.4.19f1"
        };
        let blob = new Blob([JSON.stringify(json)], {
          type: "application/json",
        });
        let blobUrl = URL.createObjectURL(blob);
        window.addEventListener("resize", resizeUnityContainer);
        UnityLoader.instantiate("unityContainer", json, {
          url: blobUrl,
          Module: {
            onRuntimeInitialized: function () {
              resizeUnityContainer();
              setTimeout(() => {
                document.getElementById("loading-screen").style.display = "none";
              }, 500);
            },
          },
        });
      });
    </script>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-text">LOADING... 0%</div>
        <div class="progress-container">
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>
    <div id="unityContainer"></div>
  </body>
</html>
