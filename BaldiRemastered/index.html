<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Baldi's Basics Remastered</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
body { background: #231F20; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
#unity-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
#unity-canvas { width: 100%; height: 100%; background: #000; }
#loading-ui { position: absolute; text-align: center; width: 300px; }
#bar-container { width: 100%; height: 6px; background: #333; margin-top: 10px; border-radius: 3px; }
#bar-fill { width: 0%; height: 100%; background: #eee; border-radius: 3px; transition: width 0.1s; }
#status-text { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="unity-container">
<canvas id="unity-canvas" tabindex="-1"></canvas>
<div id="loading-ui">
<div id="status-text">Loading...</div>
<div id="bar-container"><div id="bar-fill"></div></div>
</div>
</div>
<script src="Build/WebGL.loader.js"></script>
<script>
const canvas = document.querySelector("#unity-canvas");
const statusText = document.querySelector("#status-text");
const barFill = document.querySelector("#bar-fill");
const loadingUI = document.querySelector("#loading-ui");

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    const meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.getElementsByTagName('head')[0].appendChild(meta);
}

async function getCombinedBlob(path, count, label) {
    const parts = [];
    for (let i = 1; i <= count; i++) {
        const url = `${path}.part${i}`;
        statusText.textContent = `${label} ${Math.round((i/count)*100)}%`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Missing ${url}`);
        parts.push(await res.arrayBuffer());
        barFill.style.width = `${(i/count)*100}%`;
    }
    return URL.createObjectURL(new Blob(parts));
}

(async () => {
    try {
        const dataUrl = await getCombinedBlob("Build/WebGL.data", 3, "Loading");
        const wasmUrl = await getCombinedBlob("Build/WebGL.wasm", 3, "Loading");
        
        createUnityInstance(canvas, {
            dataUrl: dataUrl,
            frameworkUrl: "Build/WebGL.framework.js",
            codeUrl: wasmUrl,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Basically Games",
            productName: "Baldi's Basics Classic Remastered",
            productVersion: "1.1",
        }).then(() => {
            loadingUI.remove();
        });
    } catch (error) {
        statusText.textContent = "Error loading game";
    }
})();
</script>
</body>
</html>
