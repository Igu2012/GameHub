<!DOCTYPE html>
<html lang="en-us">
<head>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Kingdom Rush Unblocked - ClassRoom6x</title>
  
  <link rel="stylesheet" href="patch/unity/TemplateData/style.css">
  <script src="patch/unity/TemplateData/UnityProgress.js"></script>
  <script src="Build/UnityLoader.js"></script>
  <!-- <script src="js/unity-mod.js"></script> -->
  <script>
    function fixGameView() {
      const gameView= document.getElementById("gameView");
      if (gameView.clientHeight> gameView.clientWidth) {
        gameView.style.height= Math.floor(gameView.clientWidth)+ "px";
      }
    }
  var gameInstance = UnityLoader.instantiate(
    "gameContainer",
    "Build/GD.json", {
      onProgress: UnityProgress,Module:{
        onRuntimeInitialized: function() {
          UnityProgress(gameInstance, "complete")
        }
      }
    });
  </script>

<script>
    // Fullscreen for mobile devices
    function enableFullscreen() {
        var doc = window.document;
        var docEl = doc.documentElement;

        var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        
        if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
            if (requestFullScreen) {
                requestFullScreen.call(docEl);
            }
        }
    }

    // Add event listeners to trigger fullscreen on first interaction
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        ['touchstart', 'click', 'keydown'].forEach(event => {
            window.addEventListener(event, enableFullscreen, { once: true });
        });
    }
</script>
</head>
<body style="overflow:hidden; margin:0; padding:0;" onload="fixGameView()">
  <div id="gameView" class="webgl-content" style="overflow:hidden; width:100%; height:100%; margin:0; padding:0; position:absolute;">
    <div id="gameContainer" style="width: 100%; height: 100%;"></div>
  </div>
  <script src="js/analytics_ucbg_v1_4.js"></script>
  <script src="js/ucbg_client_v1_1.js"></script>
</body>
</html>
