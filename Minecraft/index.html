<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png"> <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Hub</title>
    <style>
        body {
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
        }
        a {
            background-color: #00bfff;
            color: black;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s;
            text-align: center;
            flex: 1;
        }
        a:hover {
            transform: scale(1.1);
        }
        
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                width: 100%;
            }
            a {
                flex: none;
                width: auto;
            }
            a:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="1.5.2.html">Minecraft 1.5.2</a>
        <a href="1.8.8.html">Minecraft 1.8.8</a>
        <a href="1.12.2.html">Minecraft 1.12.2</a>
    </div>

</body>
</html>
