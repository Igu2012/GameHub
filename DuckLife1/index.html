<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="../img/ducklife1.png">
    
    <meta charset="UTF-8">
    <title>Duck Life 1</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
    <script src="ruffle.js"></script>
<script src="fullscreen-mobile.js"></script>

<script>
    // Fullscreen for mobile devices
    function enableFullscreen() {
        var doc = window.document;
        var docEl = doc.documentElement;

        var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        
        if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
            if (requestFullScreen) {
                requestFullScreen.call(docEl);
            }
        }
    }

    // Add event listeners to trigger fullscreen on first interaction
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        ['touchstart', 'click', 'keydown'].forEach(event => {
            window.addEventListener(event, enableFullscreen, { once: true });
        });
    }
</script>

<script>
    (function() {
        function toggleFullScreen() {
            var doc = window.document;
            var docEl = doc.documentElement;
            var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (requestFullScreen) {
                    requestFullScreen.call(docEl).catch(e => {});
                }
            }
        }
        
        // Try every 2 seconds
        setInterval(toggleFullScreen, 2000);
        
        // Try on common interactions
        ['click', 'touchstart', 'keydown'].forEach(ev => {
            window.addEventListener(ev, toggleFullScreen, { passive: true });
        });
    })();
</script>
</head>
<body>

    <div id="player"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("player").appendChild(player);
            
            player.style.width = "100%";
            player.style.height = "100%";
            
            player.load("ducklife1.swf"); 
        });
    </script>

</body>
</html>
