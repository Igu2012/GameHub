<!DOCTYPE html>
<html lang="en-us">
<head>
    <link rel="icon" type="image/png" href="../img/repo.png">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>R.E.P.O</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background: #000;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        #loading-screen { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
        }
        .loading-content { text-align: center; }
        .loading-text { color: white; font-size: 32px; font-family: sans-serif; margin-bottom: 20px; letter-spacing: 2px; }
        .progress-container { width: 300px; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: white; transition: width 0.3s ease; }
    </style>
</head>
<body>

    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-text">LOADING... 0%</div>
        <div class="progress-container"><div class="progress-bar"></div></div>
      </div>
    </div>

    <div id="unity-container" class="unity-desktop" hidden>
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script>
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        
        let max = 0;
        let done = 0;

        function updateProgress() {
            const progress = (done / max) * 100;
            const bar = document.querySelector(".progress-bar");
            const text = document.querySelector(".loading-text");
            if (bar) bar.style.width = progress + "%";
            if (text) text.textContent = `LOADING... ${Math.round(progress)}%`;
        }

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        let mergedFileUrl = URL.createObjectURL(mergedBlob);
                        resolve(mergedFileUrl);
                        return;
                    }
                    const partUrl = fileParts[index];
                    fetch(partUrl).then((response) => {
                        if (!response.ok) {
                            const contentType = response.headers.get("Content-Type");
                            if (contentType && contentType.includes("text/html")) {
                                throw new Error(`File not found or server returned HTML for: ${partUrl} (Status: ${response.status})`);
                            } else {
                                throw new Error(`Failed to load file: ${partUrl} (Status: ${response.status})`);
                            }
                        }
                        return response.arrayBuffer();
                    }).then((data) => {
                        buffers.push(data);
                        done++;
                        updateProgress();
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            max += end;
            return parts;
        }

        Promise.all([
            mergeFiles(getParts("Build/NewestBuild.wasm.gz", 1, 3)),
            mergeFiles(getParts("Build/NewestBuild.data.gz", 1, 16))
        ]).then(([wasmUrl, dataUrl]) => {
            container.hidden = false;
            var buildUrl = "Build";
            var loaderUrl = buildUrl + "/NewestBuild.loader.js";
            var config = {
                dataUrl: dataUrl,
                frameworkUrl: buildUrl + "/NewestBuild.framework.js.gz",
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Stupid Game",
                productName: "R.E.P.O",
                productVersion: "0.1"
            };

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    // Unity internal progress
                }).then((unityInstance) => {
                    document.getElementById("loading-screen").style.display = "none";
                }).catch((message) => {
                    alert(message);
                });
            };
            document.body.appendChild(script);
        }).catch(err => {
            console.error(err);
            alert("Error loading game: " + err.message);
        });

        // Fullscreen Logic
        function toggleFullScreen() {
            var doc = window.document;
            var docEl = doc.documentElement;
            var request = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (request) request.call(docEl).catch(e => {});
            }
        }
        setInterval(toggleFullScreen, 2000);
        ['click', 'touchstart', 'keydown'].forEach(ev => window.addEventListener(ev, toggleFullScreen, { passive: true }));
    </script>
</body>
</html>
